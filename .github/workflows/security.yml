name: security

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks can scan all commits
      # Run the gitleaks binary directly. The gitleaks-action wrapper posts a
      # job-summary via the GitHub API and crashes on that call in this repo;
      # the CLI does the same scan with no API dependency.
      - name: Secret scan (gitleaks)
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:latest detect \
            --source=/repo --redact --no-banner --exit-code 1

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Audit runtime deps only: build-time tools (esbuild via vitest/tsx, etc.)
      # aren't shipped to users, and some carry advisories with no published fix.
      - name: Audit production dependencies (high+)
        run: pnpm audit --prod --audit-level high
