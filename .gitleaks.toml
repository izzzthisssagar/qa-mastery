# gitleaks config — extends the default rules, allowlisting fixtures that look
# like secrets but aren't real credentials. Real secrets live in env only.
[extend]
useDefault = true

[allowlist]
description = "Fake fixtures and placeholders — not real credentials"
# Unit-test files carry deliberately-fake secrets (e.g. a 16-char signing key
# used to exercise token code); .env.example holds placeholder values only.
paths = [
  '''.*\.test\.ts$''',
  '''(^|/)\.env\.example$''',
]
# The intentional BuggyShop demo password (a curriculum subject, not a credential).
regexes = [
  '''test-secret-at-least-16-chars-long''',
]
