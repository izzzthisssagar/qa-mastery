name: deploy-staging

# Vercel auto-deploys the two apps from its own Git integration. This workflow
# owns the parts Vercel doesn't: applying DB migrations to the staging Supabase
# project and publishing the curriculum registry, on every merge to main.
#
# Inert until the deploy secrets/vars are configured (the guard step exits
# cleanly), so it never blocks the repo before launch infra exists. To enable:
#   Secrets: SUPABASE_ACCESS_TOKEN, STAGING_SERVICE_ROLE_KEY
#   Vars:    SUPABASE_PROJECT_REF (e.g. rnmxbtokqebkqibsjmrt), STAGING_SUPABASE_URL

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  migrate-and-seed:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.STAGING_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SERVICE_ROLE_KEY }}
    steps:
      - name: Guard — skip until deploy secrets are configured
        id: guard
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::notice::Deploy secrets not set — skipping staging deploy (see DEPLOYMENT.md)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip != 'true'

      - uses: pnpm/action-setup@v4
        if: steps.guard.outputs.skip != 'true'

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Apply migrations to staging Supabase
        if: steps.guard.outputs.skip != 'true'
        run: |
          pnpm exec supabase link --project-ref "$SUPABASE_PROJECT_REF"
          pnpm exec supabase db push

      - name: Publish curriculum registry
        if: steps.guard.outputs.skip != 'true'
        run: pnpm --filter @qa-mastery/curriculum sync --apply
