name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Supabase URL/keys are exported via GITHUB_ENV by the "Export Supabase env"
  # step (real local stack) — do NOT define them here, workflow env would
  # shadow the runner env.
  SANDBOX_JWT_SECRET: ci-only-secret-not-a-real-one
  NEXT_PUBLIC_PLATFORM_URL: http://localhost:3000
  NEXT_PUBLIC_BUGGYSHOP_URL: http://localhost:3001
  BILLING_ENABLED: "false"

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Validate curriculum content
        run: pnpm --filter @qa-mastery/curriculum sync

      - name: Start local Supabase (applies migrations)
        run: pnpm exec supabase start

      - name: Export Supabase env
        run: |
          eval "$(pnpm exec supabase status -o env | grep -E '^(API_URL|ANON_KEY|SERVICE_ROLE_KEY)=')"
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
          } >> "$GITHUB_ENV"

      # Lessons live in MDX and reach the DB registry only via `sync --apply`.
      # Without this the lessons table is empty and every learn e2e fails with
      # "Lesson not available". (migrations + supabase seed don't cover content.)
      - name: Seed curriculum registry
        run: pnpm --filter @qa-mastery/curriculum sync --apply

      - name: Build both apps
        run: pnpm build

      - name: Manifest leak check (client bundles)
        run: |
          if grep -rl "title_internal\|repro_steps_internal" apps/platform/.next/static apps/buggyshop/.next/static 2>/dev/null; then
            echo "::error::Internal bug-manifest fields found in a client bundle — grading integrity broken."
            exit 1
          fi
          echo "No manifest fields in client bundles."

      - name: Install Playwright browsers
        run: pnpm --filter @qa-mastery/e2e exec playwright install --with-deps chromium webkit

      - name: E2E (production builds + live DB, Chromium + WebKit)
        run: pnpm e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
